# Example 04 — A SYNTHESIS_EDGE Activity for LiCl melting point.

id: act:synth-licl-mp-v0
type: isom:activity_type/synthesis_edge
viewpoint_directive_id: vpt:alkali-halide-thermo-v0
provenance: >-
  Synthesis Activity that promotes the LiCl melting-point claim statement
  attached to obj:paper-licl-demo-v0 into a first-class claim Object
