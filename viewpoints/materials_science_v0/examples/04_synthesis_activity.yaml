    rationale: >-
      Paper Object and its anchoring EvidenceRecord share viewpoint and
      inherited scope.
    status: conditionally_compatible
    viewpoint_directive_id: vpt:alkali-halide-thermo-v0

confidence:
  value: 0.78
  confidence_basis: aggregated
  calibration_scope: >-
    Aggregated from input EvidenceRecord's parser_self_report (0.92) with
