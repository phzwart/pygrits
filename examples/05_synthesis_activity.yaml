# Example 05 — A SYNTHESIS_EDGE Activity.
#
# Consumes the paper Object (Example 03) and its evidence record (Example 04),
# applies an interpretation under stated assumptions, and emits a new claim
# Object (referenced in outputs).
#
# Demonstrates the compositional principle (§2.10): the Activity produces a
# new entity; it does not mutate the paper or evidence.
#
# Validate with:
#   linkml-validate -s schema/isom_core.yaml -C Activity examples/05_synthesis_activity.yaml

id: act:synth-licl-mp-v0
type: isom:activity_type/synthesis_edge
viewpoint_directive_id: vpt:alkali-halide-thermo-v0
provenance: >-
  Synthesis Activity that promotes the LiCl melting-point claim statement
  attached to obj:paper-licl-demo-v0 into a first-class claim Object
  obj:claim-licl-mp-v0. Triggered by user query for LiCl thermodynamic data.

should_not_claim:
  - "This activity records the synthesis step; the produced claim object's epistemic status is what carries forward, not the activity's existence."
  - "Synthesis under v0 viewpoint with unresolved citation lineage is not a validation of the underlying value."

scope:
  thermodynamic:
    pressure_pascal: 101325.0
    notes: "Synthesis inherits ambient-pressure scope from inputs."

review_state: machine_generated
lifecycle_state: synthesized
generation_mode: synthesis_v0

activity_type: SYNTHESIS_EDGE

inputs:
  - obj:paper-licl-demo-v0
  - evi:span-licl-mp-v0

outputs:
  - obj:claim-licl-mp-v0

assumptions:
  - "The extracted value (883 K) is the value the paper intends to report (extraction_confidence sufficient)."
  - "Ambient pressure scope inherited from viewpoint and consistent across inputs."
  - "The claim's lineage inherits its source EvidenceRecord's lineage (cited, unresolved)."

admissibility_rationale: >-
  Inputs share viewpoint vpt:alkali-halide-thermo-v0 and thermodynamic scope
  (ambient pressure). EvidenceRecord directly grounds the value with a
  CharRangeLocator. extraction_confidence reaches the threshold for synthesis
  permitted by the viewpoint (>=0.85 under parser_self_report basis, with
  caveat that this is not a calibrated guarantee).

compatibility_judgments:
  - compared_entity_ids:
      - obj:paper-licl-demo-v0
      - evi:span-licl-mp-v0
    checked_scope_dimensions:
      - thermodynamic
      - methodological
    assumptions:
      - "Both inputs operate under inherited ambient-pressure scope."
    rationale: >-
      Paper Object and its anchoring EvidenceRecord share viewpoint and
      inherited scope. Methodological scope is partially unspecified in both
      (extracted text does not state instrument/protocol), but consistently so.
    status: conditionally_compatible
    viewpoint_directive_id: vpt:alkali-halide-thermo-v0

confidence:
  value: 0.78
  confidence_basis: aggregated
  calibration_scope: >-
    Aggregated from input EvidenceRecord's parser_self_report (0.92) with
    a discount for unresolved citation lineage and partially-unspecified
    methodological scope. Combination method: multiplicative under
    independence-violation discount. Not a calibrated guarantee.
  confidence_domain: undefined
  failure_modes:
    - "Citation lineage unresolved — value may be propagated from prior literature without independent measurement."
    - "Methodological scope partially unspecified — comparability with other LiCl measurements not guaranteed."
  viewpoint_directive_id: vpt:alkali-halide-thermo-v0
