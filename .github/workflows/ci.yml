name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run tests
        run: pytest

  schema-consistency:
    # Regenerate the Pydantic + JSON Schema from the LinkML source and
    # assert the checked-in files match. This catches "I changed core.yaml
    # but forgot to regenerate" silent drift.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with schema deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[schema]'

      - name: Regenerate artifacts
        run: |
          bash scripts/regenerate.sh

      - name: Assert no drift
        run: |
          if ! git diff --exit-code src/pygrits/core.py src/pygrits/core.schema.json; then
            echo "Generated artifacts are out of date with src/pygrits/core.yaml"
            echo "Run scripts/regenerate.sh and commit the result"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/
